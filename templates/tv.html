<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autoliv — Shift Manager TV</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #eef3f8;
      --surface: #ffffff;
      --line: #c7d3df;
      --line-strong: #9fb2c4;
      --head: #123e6b;
      --head-text: #ffffff;
      --muted: #60768d;
      --text: #16304a;
      --today: #fff2c4;
      --weekend: #f3f6f9;
      --filled: #eef6ff;
      --filled-12h: #fff0d9;
      --position-accent: #2f6db2;
      --position-bg: #edf4fb;
      --header-height: 34px;
      --subhead-height: 20px;
      --footer-height: 18px;
      --font-size: 9px;
      --header-font-size: 10px;
      --row-height: 14px;
      --cell-pad: 1px;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      -webkit-user-select: none;
      user-select: none;
      cursor: none;
    }

    body {
      display: grid;
      grid-template-rows: var(--header-height) var(--subhead-height) 1fr var(--footer-height);
      gap: 2px;
      padding: 2px;
    }

    #topbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      background: var(--head);
      color: var(--head-text);
      overflow: hidden;
    }

    #topbar-logo {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 2px;
      white-space: nowrap;
    }

    #topbar-title {
      font-size: 14px;
      font-weight: 800;
      color: #e7f0fb;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #topbar-clock {
      justify-self: end;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    #subhead {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 18px;
      padding: 0 8px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--muted);
      font-size: 9px;
      white-space: nowrap;
      overflow: hidden;
    }

    .subhead-value {
      font-weight: 800;
      color: var(--text);
    }

    #main {
      min-height: 0;
      overflow: hidden;
      border: 1px solid var(--line-strong);
      background: var(--surface);
    }

    #table-wrap {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    table {
      width: 100%;
      height: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: var(--font-size);
    }

    th, td {
      border: 1px solid #ccc;
      padding: 2px;
      text-align: center;
      vertical-align: middle;
      overflow: hidden;
    }

    thead th {
      background: var(--head);
      color: var(--head-text);
      font-size: var(--header-font-size);
      font-weight: 800;
      line-height: 1.05;
    }

    tbody tr {
      height: 24px;
    }

    .col-position {
      width: 18%;
      text-align: left;
    }

    .col-shift {
      width: 6%;
    }

    .col-day {
      width: 10.85%;
    }

    .day-head {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
    }

    .day-title {
      font-weight: 800;
    }

    .day-date {
      font-size: 8px;
      color: #dbe8f5;
    }

    .position-cell {
      padding: 0;
      background: var(--position-bg);
      text-align: left;
      white-space: normal;
    }

    .position-tag {
      min-height: 100%;
      display: grid;
      grid-template-columns: 5px 1fr;
    }

    .position-tag-accent {
      background: var(--position-accent);
    }

    .position-tag-text {
      display: flex;
      align-items: center;
      padding: 1px 4px;
      font-weight: 800;
      line-height: 1.05;
      color: var(--text);
      background: linear-gradient(180deg, #f6faff 0%, #e9f1f9 100%);
    }

    .shift-cell {
      font-weight: 800;
      color: #fff;
      background: #0c549f;
      white-space: nowrap;
    }

    .people-cell {
      background: #f7f9fb;
      padding: 0 2px;
    }

    .people-cell.filled {
      background: var(--filled);
    }

    .people-cell.h12 {
      background: var(--filled-12h);
    }

    .people-cell.today {
      box-shadow: inset 0 0 0 9999px rgba(255, 242, 196, 0.6);
    }

    .people-cell.weekend {
      box-shadow: inset 0 0 0 9999px rgba(243, 246, 249, 0.72);
    }

    .people-lines {
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0;
      line-height: 1;
    }

    .person-line {
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: var(--font-size);
      font-weight: 700;
    }

    .person-line.h12 {
      color: #b54a1d;
    }

    .empty-mark {
      color: #7a8fa7;
      font-weight: 600;
      font-size: 8px;
    }

    .empty-board {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: #0c549f;
    }

    #footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 6px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--muted);
      font-size: 8px;
      white-space: nowrap;
      overflow: hidden;
    }

    #footer-status {
      color: #1d7d45;
      font-weight: 700;
    }

    body.compact-13 {
      --font-size: 8px;
      --header-font-size: 9px;
    }

    body.compact-18 {
      --font-size: 7px;
      --header-font-size: 8px;
    }
  </style>
</head>
<body>
  <header id="topbar">
    <div id="topbar-logo">AUTOLIV</div>
    <div id="topbar-title">Shift Dashboard</div>
    <div id="topbar-clock">00:00:00</div>
  </header>

  <div id="subhead">
    <div>Departamente: <span id="department-label" class="subhead-value">—</span></div>
    <div><span id="week-label" class="subhead-value">—</span></div>
  </div>

  <main id="main">
    <div id="table-wrap" aria-live="polite"></div>
  </main>

  <footer id="footer">
    <div>Ultima actualizare: <span id="footer-last-update">—</span></div>
    <div>Status: <span id="footer-status">Conectat</span></div>
  </footer>

  <script>
    'use strict';

    const DATA_URL = '/api/tv-data';
    const RELOAD_MS = 5000;
    const SHIFT_LABELS = { Sch1: 'Sch1', Sch2: 'Sch2', Sch3: 'Sch3' };
    const POSITION_PALETTE = [
      '#2f6db2', '#3d8f58', '#b57b22', '#8d5db7', '#c75b4a', '#2f8a8a', '#6a78c2', '#b34f86'
    ];
    const WEEKEND_DAYS = new Set(['Sambata', 'Duminica']);

    function createElement(tag, className, text) {
      const element = document.createElement(tag);
      if (className) element.className = className;
      if (text !== undefined) element.textContent = text;
      return element;
    }

    function setClock() {
      const now = new Date();
      const pad = value => String(value).padStart(2, '0');
      document.getElementById('topbar-clock').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())} ${pad(now.getDate())}/${pad(now.getMonth() + 1)}/${now.getFullYear()}`;
    }

    function formatPublishTime(value) {
      if (!value) return '—';
      const parsed = new Date(value);
      if (Number.isNaN(parsed.getTime())) return '—';
      return parsed.toLocaleString('ro-RO', {
        day: '2-digit',
        month: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function collectItems(data) {
      const items = [];
      Object.entries(data.departments || {}).forEach(([modeName, departments]) => {
        (departments || []).forEach(department => {
          items.push({ modeName, department });
        });
      });
      return items;
    }

    function collectDepartmentNames(items) {
      return [...new Set(items.map(item => item.modeName).filter(Boolean))];
    }

    function applyDensity(positionCount) {
      document.body.classList.remove('compact-13', 'compact-18');
      if (positionCount >= 18) {
        document.body.classList.add('compact-18');
      } else if (positionCount >= 13) {
        document.body.classList.add('compact-13');
      }
    }

    function colorForPosition(positionName) {
      let hash = 0;
      for (const char of String(positionName || '').toLowerCase()) {
        hash = ((hash << 5) - hash) + char.charCodeAt(0);
        hash |= 0;
      }
      return POSITION_PALETTE[Math.abs(hash) % POSITION_PALETTE.length];
    }

    function buildHeaderRow(displayDays, data) {
      const thead = document.createElement('thead');
      const row = document.createElement('tr');
      row.appendChild(createElement('th', 'col-position', 'Poziție / Departament'));
      row.appendChild(createElement('th', 'col-shift', 'Schimb'));

      displayDays.forEach(day => {
        const head = createElement('th', 'col-day');
        const wrapper = createElement('div', 'day-head');
        wrapper.appendChild(createElement('div', 'day-title', day));
        wrapper.appendChild(createElement('div', 'day-date', (data.day_dates || {})[day] || ''));
        head.appendChild(wrapper);
        row.appendChild(head);
      });

      thead.appendChild(row);
      return thead;
    }

    function buildPeopleCell(entries, day, data) {
      const cell = createElement('td', 'people-cell');
      const iso = (data.day_dates_iso || {})[day];
      if (iso === data.today_iso) cell.classList.add('today');
      if (WEEKEND_DAYS.has(day)) cell.classList.add('weekend');
      if (entries.length) cell.classList.add('filled');
      if (entries.some(entry => entry.hours12)) cell.classList.add('h12');

      const lines = createElement('div', 'people-lines');
      if (!entries.length) {
        lines.appendChild(createElement('div', 'empty-mark', '—'));
      } else {
        entries.forEach(entry => {
          lines.appendChild(createElement('div', `person-line${entry.hours12 ? ' h12' : ''}`, entry.name || '—'));
        });
      }
      cell.appendChild(lines);
      return cell;
    }

    function buildBodyRows(items, displayDays, data) {
      const tbody = document.createElement('tbody');

      items.forEach(item => {
        ['Sch1', 'Sch2', 'Sch3'].forEach((shift, index) => {
          const row = document.createElement('tr');

          if (index === 0) {
            const positionCell = createElement('td', 'position-cell');
            positionCell.rowSpan = 3;
            const tag = createElement('div', 'position-tag');
            const accent = createElement('div', 'position-tag-accent');
            accent.style.background = colorForPosition(item.department);
            const label = createElement('div', 'position-tag-text', `${item.department} / ${item.modeName}`);
            tag.appendChild(accent);
            tag.appendChild(label);
            positionCell.appendChild(tag);
            row.appendChild(positionCell);
          }

          row.appendChild(createElement('td', 'shift-cell', SHIFT_LABELS[shift] || shift));

          displayDays.forEach(day => {
            const entries = ((((data.schedule || {})[item.modeName] || {})[item.department] || {})[day] || {})[shift] || [];
            row.appendChild(buildPeopleCell(entries, day, data));
          });

          tbody.appendChild(row);
        });
      });

      return tbody;
    }

    function renderEmpty(message) {
      const wrap = document.getElementById('table-wrap');
      wrap.innerHTML = '';
      wrap.appendChild(createElement('div', 'empty-board', message || 'Nu există date publicate'));
      document.getElementById('department-label').textContent = '—';
      document.getElementById('week-label').textContent = message || 'Nu există date publicate';
    }

    function render(payload) {
      const items = collectItems(payload);
      if (!items.length || payload.has_data === false) {
        renderEmpty(payload.message || 'Nu există date publicate');
        return;
      }

      applyDensity(items.length);
      const wrap = document.getElementById('table-wrap');
      wrap.innerHTML = '';
      const table = document.createElement('table');
      const displayDays = payload.display_days || [];
      table.appendChild(buildHeaderRow(displayDays, payload));
      table.appendChild(buildBodyRows(items, displayDays, payload));
      wrap.appendChild(table);

      document.getElementById('department-label').textContent = collectDepartmentNames(items).join(' + ') || '—';
      document.getElementById('week-label').textContent = [payload.week_label || '', payload.week_range ? `(${payload.week_range})` : ''].filter(Boolean).join(' ') || 'Planificare curentă';
    }

    async function loadTvData() {
      try {
        const response = await fetch(DATA_URL, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        if (!payload || payload.error || !payload.data) throw new Error(payload?.error || 'No data');

        document.getElementById('footer-last-update').textContent = formatPublishTime(payload.last_publish_time);
        document.getElementById('footer-status').textContent = 'Conectat';
        render(payload.data);
      } catch (_error) {
        document.getElementById('footer-status').textContent = 'Deconectat';
        renderEmpty('Nu există date publicate');
      }
    }

    function init() {
      setClock();
      loadTvData();
      setInterval(setClock, 1000);
      setInterval(() => {
        location.reload();
      }, RELOAD_MS);
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
