<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autoliv — Shift Manager TV</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #e9eef5;
      --surface: #ffffff;
      --line: #c8d2dd;
      --line-strong: #9aaec2;
      --head: #123e6b;
      --head-text: #ffffff;
      --text: #16304a;
      --muted: #60768d;
      --header-height: 38px;
      --subhead-height: 24px;
      --footer-height: 22px;
      --cell-font-size: 9px;
      --day-font-size: 9px;
      --position-col-width: 96px;
      --shift-col-width: 30px;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      -webkit-user-select: none;
      user-select: none;
      cursor: none;
    }

    body {
      display: grid;
      grid-template-rows: var(--header-height) var(--subhead-height) 1fr var(--footer-height);
      gap: 3px;
      padding: 3px;
    }

    #topbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      background: var(--head);
      color: var(--head-text);
      overflow: hidden;
    }

    #topbar-logo {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 2px;
      white-space: nowrap;
    }

    #topbar-title {
      font-size: 16px;
      font-weight: 800;
      color: #e7f0fb;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #topbar-clock {
      justify-self: end;
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    #subhead {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 0 10px;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
    }

    .subhead-value {
      font-weight: 800;
      color: var(--text);
    }

    #main {
      min-height: 0;
      overflow: hidden;
      border: 1px solid var(--line-strong);
      background: var(--surface);
      padding: 6px;
    }

    #board-wrap {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.16fr);
      gap: 8px;
    }

    .department-panel {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: 30px 1fr;
      border: 1px solid var(--line-strong);
      background: #fefefe;
      overflow: hidden;
    }

    .department-title {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--head);
      color: var(--head-text);
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .department-table-wrap {
      min-width: 0;
      min-height: 0;
      padding: 6px;
      overflow: hidden;
    }

    table.department-table {
      width: 100%;
      height: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      background: #ffffff;
    }

    .department-table th,
    .department-table td {
      border: 1px solid var(--line);
      text-align: center;
      vertical-align: middle;
      overflow: hidden;
      padding: 1px;
    }

    .department-table thead th {
      background: #f3f7fb;
      color: var(--text);
      font-size: var(--day-font-size);
      font-weight: 900;
      line-height: 1.05;
      height: 36px;
    }

    .corner-cell {
      width: var(--position-col-width);
    }

    .shift-head {
      width: var(--shift-col-width);
    }

    .day-head-date {
      display: block;
      margin-top: 2px;
      font-size: 9px;
      color: var(--muted);
      font-weight: 700;
    }

    .position-cell {
      width: var(--position-col-width);
      font-size: 11px;
      font-weight: 900;
      line-height: 1.1;
      text-align: center;
      padding: 8px 6px;
      border-left-width: 8px;
      border-left-style: solid;
    }

    .shift-cell {
      width: var(--shift-col-width);
      background: #1d5ea4;
      color: #ffffff;
      font-size: 10px;
      font-weight: 900;
    }

    .day-cell {
      background: #ffffff;
      padding: 3px 2px;
    }

    .cell-content {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      text-align: center;
      overflow: hidden;
    }

    .entry-row {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      font-size: var(--cell-font-size);
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .entry-name {
      color: #1a1a1a;
      font-weight: 700;
    }

    .entry-name.h12 {
      color: #c0392b;
      font-weight: 900;
    }

    .entry-separator {
      color: #7a8fa7;
      font-weight: 700;
    }

    .entry-empty {
      color: #8ba0b2;
      font-weight: 700;
      font-size: 10px;
    }

    .empty-board {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 900;
      color: #0c549f;
    }

    #footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 8px;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 10px;
      white-space: nowrap;
      overflow: hidden;
    }

    #footer-status {
      color: #1d7d45;
      font-weight: 800;
    }

    #page-indicator {
      font-weight: 800;
      color: var(--text);
    }
  </style>
</head>
<body>
  <header id="topbar">
    <div id="topbar-logo">AUTOLIV</div>
    <div id="topbar-title">Shift Dashboard</div>
    <div id="topbar-clock">00:00:00</div>
  </header>

  <div id="subhead">
    <div><span class="subhead-value">Departament:</span> <span id="department-label" class="subhead-value">Magazie + Bucle</span></div>
    <div><span id="week-label" class="subhead-value">—</span></div>
  </div>

  <main id="main">
    <div id="board-wrap" aria-live="polite"></div>
  </main>

  <footer id="footer">
    <div>Ultima actualizare: <span id="footer-last-update">—</span></div>
    <div id="page-indicator">Toate pozițiile afișate</div>
    <div>Status: <span id="footer-status">Conectat</span></div>
  </footer>

  <script>
    'use strict';

    const DATA_URL = '/api/tv-data';
    const VERSION_URL = '/tv/version';
    const SHIFT_KEYS = ['Sch1', 'Sch2', 'Sch3'];
    const SHIFT_LABELS = { Sch1: 'Sch1', Sch2: 'Sch2', Sch3: 'Sch3' };
    const MAGAZIE_LAYOUT = [
      { key: 'Sef schimb', label: 'Șef schimb', accent: '#5B9BD5', surface: '#e7f0fb' },
      { key: 'Receptii', label: 'Recepții', accent: '#4472C4', surface: '#dfe8fb' },
      { key: 'Livrari', label: 'Livrări', accent: '#A9D18E', surface: '#e8f5db' },
      { key: 'Etichetare scanare', label: 'Etichetare + Scanare', accent: '#C9B0D9', surface: '#f0e6f7' },
      { key: 'Retragere finite', label: 'Retragere finite', accent: '#D9A35F', surface: '#f6ebd6' },
      { key: 'Balotare ambalare', label: 'Balotare / Ambalare', accent: '#D9E2F3', surface: '#eef3f9' }
    ];
    const BUCLE_LAYOUT = [
      { keys: ['BUCLA RA+RB'], label: 'BUCLA RA + RB', accent: '#cf8268', surface: '#f7e2db' },
      { keys: ['BUCLA TA+TB'], label: 'BUCLA TA + TB', accent: '#d09d59', surface: '#f7ead7' },
      { keys: ['BUCLA 02'], label: 'BUCLA 02', accent: '#d0b36d', surface: '#f8f0de' },
      { keys: ['BUCLA 03'], label: 'BUCLA 03', accent: '#d5b54a', surface: '#faf2d6' },
      { keys: ['BUCLA 04'], label: 'BUCLA 04', accent: '#d7bb4c', surface: '#fbf4da' },
      { keys: ['BUCLA 05 + 07', 'BUCLA 05'], label: 'BUCLA 05 + 07', accent: '#d9c56a', surface: '#fbf7df' },
      { keys: ['Ambalaje'], label: 'Ambalaje', accent: '#d99694', surface: '#f7e1df' }
    ];

    let currentVersion = 0;

    function createElement(tag, className, text) {
      const element = document.createElement(tag);
      if (className) element.className = className;
      if (text !== undefined) element.textContent = text;
      return element;
    }

    function setClock() {
      const now = new Date();
      const pad = value => String(value).padStart(2, '0');
      document.getElementById('topbar-clock').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())} ${pad(now.getDate())}/${pad(now.getMonth() + 1)}/${now.getFullYear()}`;
    }

    function formatPublishTime(value) {
      if (!value) return '—';
      const parsed = new Date(value);
      if (Number.isNaN(parsed.getTime())) return '—';
      return parsed.toLocaleString('ro-RO', {
        day: '2-digit',
        month: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function getDayInfo(day, payload) {
      const shortNames = {
        Luni: 'Lu',
        Marti: 'Ma',
        Miercuri: 'Mi',
        Joi: 'Jo',
        Vineri: 'Vi',
        Sambata: 'Sa',
        Duminica: 'Du'
      };
      return {
        name: shortNames[day] || day,
        date: ''
      };
    }

    function splitEntriesAcrossRows(entries) {
      if (entries.length <= 2) return [entries];
      const firstRowCount = Math.min(3, Math.ceil(entries.length / 2));
      return [entries.slice(0, firstRowCount), entries.slice(firstRowCount, 5)];
    }

    function appendEntryRow(container, entries) {
      const row = createElement('div', 'entry-row');
      entries.forEach((entry, index) => {
        row.appendChild(createElement('span', `entry-name${entry.hours12 ? ' h12' : ''}`, String(entry.name || '—')));
        if (index < entries.length - 1) {
          row.appendChild(createElement('span', 'entry-separator', '•'));
        }
      });
      container.appendChild(row);
    }

    function buildCellContent(entries) {
      const wrapper = createElement('div', 'cell-content');
      if (!entries.length) {
        wrapper.appendChild(createElement('div', 'entry-empty', '—'));
        return wrapper;
      }

      splitEntriesAcrossRows(entries.slice(0, 5)).forEach(rowEntries => appendEntryRow(wrapper, rowEntries));
      return wrapper;
    }

    function getShiftEntries(payload, modeName, departmentKeys, day, shift) {
      const modeSchedule = (payload.schedule || {})[modeName] || {};
      for (const key of departmentKeys) {
        const department = modeSchedule[key];
        if (department && department[day] && department[day][shift]) {
          return department[day][shift] || [];
        }
      }
      return [];
    }

    function buildDepartmentTable(modeName, definitions, panelTitle, payload) {
      const panel = createElement('section', 'department-panel');
      panel.appendChild(createElement('div', 'department-title', panelTitle));

      const wrap = createElement('div', 'department-table-wrap');
      const table = createElement('table', 'department-table');
      const thead = document.createElement('thead');
      const headRow = document.createElement('tr');
      headRow.appendChild(createElement('th', 'corner-cell', 'Poziție'));
      headRow.appendChild(createElement('th', 'shift-head', 'Sch'));
      (payload.display_days || []).forEach(day => {
        const dayInfo = getDayInfo(day, payload);
        const th = document.createElement('th');
        th.appendChild(createElement('div', '', dayInfo.name));
        th.appendChild(createElement('span', 'day-head-date', dayInfo.date));
        headRow.appendChild(th);
      });
      thead.appendChild(headRow);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      definitions.forEach(definition => {
        SHIFT_KEYS.forEach((shift, shiftIndex) => {
          const row = document.createElement('tr');
          if (shiftIndex === 0) {
            const positionCell = createElement('td', 'position-cell', definition.label);
            positionCell.rowSpan = SHIFT_KEYS.length;
            positionCell.style.background = definition.surface;
            positionCell.style.borderLeftColor = definition.accent;
            row.appendChild(positionCell);
          }

          row.appendChild(createElement('td', 'shift-cell', SHIFT_LABELS[shift]));
          (payload.display_days || []).forEach(day => {
            const entries = getShiftEntries(payload, modeName, definition.keys || [definition.key], day, shift);
            const td = createElement('td', 'day-cell');
            td.appendChild(buildCellContent(entries));
            row.appendChild(td);
          });
          tbody.appendChild(row);
        });
      });
      table.appendChild(tbody);
      wrap.appendChild(table);
      panel.appendChild(wrap);
      return panel;
    }

    function render_magazie_layout(payload) {
      return buildDepartmentTable('Magazie', MAGAZIE_LAYOUT, 'Magazie', payload);
    }

    function render_bucle_layout(payload) {
      return buildDepartmentTable('Bucle', BUCLE_LAYOUT, 'Bucle', payload);
    }

    function renderEmpty(message) {
      const wrap = document.getElementById('board-wrap');
      wrap.innerHTML = '';
      const empty = createElement('div', 'empty-board', message || 'Nu există date publicate');
      empty.style.gridColumn = '1 / -1';
      wrap.appendChild(empty);
      document.getElementById('week-label').textContent = message || 'Nu există date publicate';
    }

    function render(payload) {
      if (!payload || payload.has_data === false) {
        renderEmpty(payload?.message || 'Nu există date publicate');
        return;
      }

      const wrap = document.getElementById('board-wrap');
      wrap.innerHTML = '';
      wrap.appendChild(render_magazie_layout(payload));
      wrap.appendChild(render_bucle_layout(payload));
      document.getElementById('department-label').textContent = 'Magazie + Bucle';
      document.getElementById('week-label').textContent = [payload.week_label || '', payload.week_range ? `(${payload.week_range})` : ''].filter(Boolean).join(' ');
      document.getElementById('page-indicator').textContent = 'Toate pozițiile afișate';
    }

    async function loadTvData() {
      try {
        const response = await fetch(DATA_URL, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        if (!payload || payload.error || !payload.data) throw new Error(payload?.error || 'No data');
        currentVersion = Number(payload.data.tv_version || 0);
        document.getElementById('footer-last-update').textContent = formatPublishTime(payload.last_publish_time);
        document.getElementById('footer-status').textContent = 'Conectat';
        render(payload.data);
      } catch (_error) {
        document.getElementById('footer-status').textContent = 'Deconectat';
        renderEmpty('Nu există date publicate');
      }
    }

    async function checkUpdate() {
      try {
        const response = await fetch(VERSION_URL, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        const nextVersion = Number(payload.version || 0);
        if (nextVersion !== currentVersion) {
          location.reload();
          return;
        }
        currentVersion = nextVersion;
      } catch (_error) {
      }
    }

    function init() {
      setClock();
      loadTvData();
      setInterval(setClock, 1000);
      setInterval(checkUpdate, 2000);
      setInterval(() => location.reload(), 5000);
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
