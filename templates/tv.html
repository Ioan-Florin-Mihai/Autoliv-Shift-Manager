<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autoliv — Shift Manager TV</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #e9eef5;
      --surface: #ffffff;
      --line: #c8d2dd;
      --line-strong: #9aaec2;
      --head: #123e6b;
      --head-text: #ffffff;
      --text: #16304a;
      --muted: #60768d;
      --header-height: 38px;
      --subhead-height: 24px;
      --footer-height: 22px;
      --cell-font-size: 11px;
      --day-font-size: 11px;
      --position-col-width: 59px;
      --shift-col-width: 24px;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      -webkit-user-select: none;
      user-select: none;
      cursor: none;
    }

    body {
      display: grid;
      grid-template-rows: var(--header-height) var(--subhead-height) 1fr var(--footer-height);
      gap: 3px;
      padding: 3px;
    }

    #topbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      background: var(--head);
      color: var(--head-text);
      overflow: hidden;
    }

    #topbar-logo {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 2px;
      white-space: nowrap;
    }

    #topbar-title {
      font-size: 16px;
      font-weight: 800;
      color: #e7f0fb;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #topbar-clock {
      justify-self: end;
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    #subhead {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 0 10px;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
    }

    .subhead-value {
      font-weight: 800;
      color: var(--text);
    }

    #main {
      min-height: 0;
      overflow: hidden;
      border: 1px solid var(--line-strong);
      background: var(--surface);
      padding: 3px;
    }

    #tv-root {
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
    }

    .tv-page {
      width: 100%;
      height: 100%;
      --row-count: 18;
      background: #fefefe;
      overflow: hidden;
    }

    .department-table-wrap {
      min-width: 0;
      height: 100%;
      padding: 3px;
      overflow: hidden;
    }

    table.department-table {
      width: 100%;
      height: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      background: #ffffff;
    }

    .department-table th,
    .department-table td {
      border: 1px solid var(--line);
      text-align: center;
      vertical-align: top;
      padding: 1px;
    }

    .department-table thead th {
      background: #1d5ea4;
      color: #ffffff;
      font-size: var(--day-font-size);
      font-weight: 900;
      line-height: 1.05;
      height: 32px;
      vertical-align: middle;
      padding: 0 2px;
    }

    .department-table tbody tr {
      height: calc((100% - 32px) / var(--row-count));
    }

    .corner-cell {
      width: var(--position-col-width);
    }

    .shift-head {
      width: var(--shift-col-width);
    }

    .weekday-col {
      width: 13.2%;
    }

    .weekend-col {
      width: 11.22%;
    }

    .day-head-label {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 30px;
      text-align: center;
      font-size: 10px;
      line-height: 1;
      white-space: nowrap;
    }

    .day-head-date {
      display: block;
      margin-top: 2px;
      font-size: 9px;
      color: var(--muted);
      font-weight: 700;
    }

    .position-cell {
      width: var(--position-col-width);
      text-align: center;
      vertical-align: middle;
      padding: 0;
      border-left-width: 8px;
      border-left-style: solid;
    }

    .position-label {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3px 2px;
      font-size: 11px;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      font-weight: 900;
      line-height: 1.02;
      letter-spacing: 0;
      color: #17324a;
    }

    .shift-cell {
      width: var(--shift-col-width);
      background: #1d5ea4;
      color: #ffffff;
      font-size: 8px;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      font-weight: 900;
      vertical-align: middle;
      padding: 1px 2px;
    }

    .day-cell {
      background: #ffffff;
      color: #1a1a1a;
      font-weight: 800;
    }

    .cell {
      font-size: 14px;
      font-family: "Bahnschrift SemiCondensed", "Arial Narrow", "Segoe UI", sans-serif;
      line-height: 1.08;
      padding: 2px 3px;
      white-space: normal;
      word-break: normal;
      overflow-wrap: break-word;
      text-align: left;
      letter-spacing: -0.15px;
      font-weight: 900;
    }

    .employee-entry {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 100%;
      vertical-align: baseline;
    }

    .employee-name {
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    /* Consistent with desktop planner: 12h highlighted in red */
    .employee-entry.shift-12h .employee-name {
      color: #C0392B;
      font-weight: 700;
    }

    .employee-entry.shift-8h .employee-name {
      color: #111111;
      font-weight: 600;
    }

    .shift-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 6px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
      color: #FFFFFF;
      flex: 0 0 auto;
    }

    .shift-badge-12 {
      background: #C0392B;
    }

    .shift-badge-8 {
      background: #2C5E9E;
    }

    .entry-empty {
      color: #8ba0b2;
      font-weight: 700;
      font-size: 10px;
    }

    .empty-board {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 900;
      color: #0c549f;
    }

    #footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 8px;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 10px;
      white-space: nowrap;
      overflow: hidden;
    }

    #footer-status {
      color: #1d7d45;
      font-weight: 800;
    }

    #page-indicator {
      font-weight: 800;
      color: var(--text);
    }
  </style>
</head>
<body>
  <header id="topbar">
    <div id="topbar-logo">AUTOLIV</div>
    <div id="topbar-title">Shift Dashboard</div>
    <div id="topbar-clock">00:00:00</div>
  </header>

  <div id="subhead">
    <div><span class="subhead-value">Departament:</span> <span id="department-label" class="subhead-value">Magazie</span></div>
    <div><span id="week-label" class="subhead-value">—</span></div>
  </div>

  <main id="main">
    <div id="tv-root" aria-live="polite"></div>
  </main>

  <footer id="footer">
    <div>Ultima actualizare: <span id="footer-last-update">—</span></div>
    <div id="page-indicator">Pagina 1 / 2</div>
    <div>Status: <span id="footer-status">Conectat</span></div>
  </footer>

  <script>
    'use strict';

    const DATA_URL = '/api/tv-data';
    const VERSION_URL = '/tv/version';
    const SHIFT_KEYS = ['Sch1', 'Sch2', 'Sch3'];
    const SHIFT_LABELS = { Sch1: 'Sch1', Sch2: 'Sch2', Sch3: 'Sch3' };
    const pages = ['Magazie', 'Bucle'];
    const PAGE_SWITCH_MS = 10000;
    const PAGE_CYCLE_KEY = 'tvPageCycleStartedAt';
    const MAGAZIE_LAYOUT = [
      { key: 'Sef schimb', label: 'Șef schimb', accent: '#5B9BD5', surface: '#e7f0fb' },
      { key: 'Receptii', label: 'Recepții', accent: '#4472C4', surface: '#dfe8fb' },
      { key: 'Livrari', label: 'Livrări', accent: '#A9D18E', surface: '#e8f5db' },
      { key: 'Etichetare scanare', label: 'Etichetare + Scanare', accent: '#C9B0D9', surface: '#f0e6f7' },
      { key: 'Retragere finite', label: 'Retragere finite', accent: '#D9A35F', surface: '#f6ebd6' },
      { key: 'Balotare ambalare', label: 'Balotare / Ambalare', accent: '#D9E2F3', surface: '#eef3f9' }
    ];
    const BUCLE_LAYOUT = [
      { keys: ['BUCLA RA+RB'], label: 'BUCLA RA + RB', accent: '#cf8268', surface: '#f7e2db' },
      { keys: ['BUCLA TA+TB'], label: 'BUCLA TA + TB', accent: '#d09d59', surface: '#f7ead7' },
      { keys: ['BUCLA 02'], label: 'BUCLA 02', accent: '#d0b36d', surface: '#f8f0de' },
      { keys: ['BUCLA 03'], label: 'BUCLA 03', accent: '#d5b54a', surface: '#faf2d6' },
      { keys: ['BUCLA 04'], label: 'BUCLA 04', accent: '#d7bb4c', surface: '#fbf4da' },
      { keys: ['BUCLA 05 + 07', 'BUCLA 05'], label: 'BUCLA 05 + 07', accent: '#d9c56a', surface: '#fbf7df' },
      { keys: ['Ambalaje'], label: 'Ambalaje', accent: '#d99694', surface: '#f7e1df' }
    ];

    let currentVersion = 0;
    let currentPayload = null;
    let currentPage = 0;

    function createElement(tag, className, text) {
      const element = document.createElement(tag);
      if (className) element.className = className;
      if (text !== undefined) element.textContent = text;
      return element;
    }

    function setClock() {
      const now = new Date();
      const pad = value => String(value).padStart(2, '0');
      document.getElementById('topbar-clock').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())} ${pad(now.getDate())}/${pad(now.getMonth() + 1)}/${now.getFullYear()}`;
    }

    function formatPublishTime(value) {
      if (!value) return '—';
      const parsed = new Date(value);
      if (Number.isNaN(parsed.getTime())) return '—';
      return parsed.toLocaleString('ro-RO', {
        day: '2-digit',
        month: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function getAutoPageIndex() {
      let cycleStartedAt = Number(localStorage.getItem(PAGE_CYCLE_KEY) || 0);
      if (!Number.isFinite(cycleStartedAt) || cycleStartedAt <= 0) {
        cycleStartedAt = Date.now();
        localStorage.setItem(PAGE_CYCLE_KEY, String(cycleStartedAt));
      }
      return Math.floor((Date.now() - cycleStartedAt) / PAGE_SWITCH_MS) % pages.length;
    }

    function getDayInfo(day, payload) {
      return {
        name: day,
        date: ''
      };
    }

    function formatCellContent(entries) {
      const fragment = document.createDocumentFragment();
      const normalized = (entries || [])
        .slice(0, 8)
        .map(entry => {
          const name = String((entry && entry.name) || '').trim();
          const program = String((entry && (entry.program || (entry.hours12 ? '12h' : '8h'))) || '').trim();
          const normalizedProgram = (program === '12h' || program === '12') ? '12h' : '8h';
          return { name, program: normalizedProgram };
        })
        .filter(item => item.name);

      if (!normalized.length) {
        fragment.appendChild(createElement('span', 'entry-empty', '—'));
        return fragment;
      }

      function createEmployeeEntry(item) {
        const is12 = item.program === '12h';
        const entry = createElement('span', `employee-entry ${is12 ? 'shift-12h' : 'shift-8h'}`);
        entry.appendChild(createElement('span', 'employee-name', item.name));
        entry.appendChild(createElement('span', `shift-badge ${is12 ? 'shift-badge-12' : 'shift-badge-8'}`, is12 ? '12' : '8'));
        return entry;
      }

      normalized.forEach((item, index) => {
        if (index > 0) fragment.appendChild(document.createTextNode(' / '));
        fragment.appendChild(createEmployeeEntry(item));
      });

      return fragment;
    }

    function formatCellText(entries) {
      if (!entries.length) return '—';
      return entries
        .slice(0, 8)
        .map(entry => String(entry.name || '').trim())
        .filter(Boolean)
        .join(' / ') || '—';
    }

    function getShiftEntries(payload, modeName, departmentKeys, day, shift) {
      const modeSchedule = (payload.schedule || {})[modeName] || {};
      for (const key of departmentKeys) {
        const department = modeSchedule[key];
        if (department && department[day] && department[day][shift]) {
          return department[day][shift] || [];
        }
      }
      return [];
    }

    function buildDepartmentTable(modeName, definitions, panelTitle, payload) {
      const panel = createElement('section', 'tv-page');
      panel.style.setProperty('--row-count', String(definitions.length * SHIFT_KEYS.length));

      const wrap = createElement('div', 'department-table-wrap');
      const table = createElement('table', 'department-table');
      const colgroup = document.createElement('colgroup');
      const positionCol = document.createElement('col');
      positionCol.style.width = 'var(--position-col-width)';
      colgroup.appendChild(positionCol);
      const shiftCol = document.createElement('col');
      shiftCol.style.width = 'var(--shift-col-width)';
      colgroup.appendChild(shiftCol);
      (payload.display_days || []).forEach(day => {
        const col = document.createElement('col');
        if (day === 'Sambata' || day === 'Duminica') {
          col.className = 'weekend-col';
        } else {
          col.className = 'weekday-col';
        }
        colgroup.appendChild(col);
      });
      table.appendChild(colgroup);
      const thead = document.createElement('thead');
      const headRow = document.createElement('tr');
      headRow.appendChild(createElement('th', 'corner-cell', 'Poziție'));
      headRow.appendChild(createElement('th', 'shift-head', 'Sch'));
      (payload.display_days || []).forEach(day => {
        const dayInfo = getDayInfo(day, payload);
        const th = document.createElement('th');
        th.appendChild(createElement('div', 'day-head-label', dayInfo.name));
        if (dayInfo.date) {
          th.appendChild(createElement('span', 'day-head-date', dayInfo.date));
        }
        headRow.appendChild(th);
      });
      thead.appendChild(headRow);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      definitions.forEach(definition => {
        SHIFT_KEYS.forEach((shift, shiftIndex) => {
          const row = document.createElement('tr');
          if (shiftIndex === 0) {
            const positionCell = createElement('td', 'position-cell');
            positionCell.rowSpan = SHIFT_KEYS.length;
            positionCell.style.background = definition.surface;
            positionCell.style.borderLeftColor = definition.accent;
            positionCell.appendChild(createElement('div', 'position-label', definition.label));
            row.appendChild(positionCell);
          }

          row.appendChild(createElement('td', 'shift-cell', SHIFT_LABELS[shift]));
          (payload.display_days || []).forEach(day => {
            const departmentKeys = definition.keys || [definition.key];
            const entries = getShiftEntries(payload, modeName, departmentKeys, day, shift);
            const td = createElement('td', 'day-cell cell');
            td.textContent = '';
            td.appendChild(formatCellContent(entries));
            row.appendChild(td);
          });
          tbody.appendChild(row);
        });
      });
      table.appendChild(tbody);
      wrap.appendChild(table);
      panel.appendChild(wrap);
      return panel;
    }

    function render_magazie_layout(payload) {
      return buildDepartmentTable('Magazie', MAGAZIE_LAYOUT, 'Magazie', payload);
    }

    function render_bucle_layout(payload) {
      return buildDepartmentTable('Bucle', BUCLE_LAYOUT, 'Bucle', payload);
    }

    function renderEmpty(message) {
      const wrap = document.getElementById('tv-root');
      wrap.innerHTML = '';
      const empty = createElement('div', 'empty-board', message || 'Nu există date publicate');
      wrap.appendChild(empty);
      document.getElementById('department-label').textContent = '—';
      document.getElementById('week-label').textContent = message || 'Nu există date publicate';
      document.getElementById('page-indicator').textContent = 'Pagina —';
    }

    function renderPage(department) {
      if (!currentPayload || currentPayload.has_data === false) {
        renderEmpty(currentPayload?.message || 'Nu există date publicate');
        return;
      }

      const wrap = document.getElementById('tv-root');
      wrap.innerHTML = '';
      if (department === 'Magazie') {
        wrap.appendChild(render_magazie_layout(currentPayload));
      } else {
        wrap.appendChild(render_bucle_layout(currentPayload));
      }

      document.getElementById('department-label').textContent = 'Magazie';
      document.getElementById('week-label').textContent = [currentPayload.week_label || '', currentPayload.week_range ? `(${currentPayload.week_range})` : ''].filter(Boolean).join(' ');
      document.getElementById('page-indicator').textContent = `Pagina ${currentPage + 1} / ${pages.length}`;
      sessionStorage.setItem('tvCurrentPage', String(currentPage));
    }

    function renderCurrentPage() {
      currentPage = getAutoPageIndex();
      renderPage(pages[currentPage]);
    }

    function switchPage() {
      currentPage = getAutoPageIndex();
      renderCurrentPage();
    }

    async function loadTvData() {
      try {
        const response = await fetch(DATA_URL, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        if (!payload || payload.error || !payload.data) throw new Error(payload?.error || 'No data');
        currentVersion = Number(payload.data.tv_version || 0);
        currentPayload = payload.data;
        document.getElementById('footer-last-update').textContent = formatPublishTime(payload.last_publish_time);
        document.getElementById('footer-status').textContent = 'Conectat';
        renderCurrentPage();
      } catch (_error) {
        currentPayload = null;
        document.getElementById('footer-status').textContent = 'Deconectat';
        renderEmpty('Nu există date publicate');
      }
    }

    async function checkUpdate() {
      try {
        const response = await fetch(VERSION_URL, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        const nextVersion = Number(payload.version || 0);
        if (nextVersion !== currentVersion) {
          location.reload();
          return;
        }
        currentVersion = nextVersion;
      } catch (_error) {
      }
    }

    function init() {
      setClock();
      loadTvData();
      setInterval(setClock, 1000);
      setInterval(switchPage, PAGE_SWITCH_MS);
      setInterval(checkUpdate, 2000);
      setInterval(() => location.reload(), 5000);
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
